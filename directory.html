function r(){
  var lv=P.filter(function(p){return p.live});

  for(var k in CL){

  var fl=at==="all"?P:P.filter(function(p){return p.cat===at});
  var gp={};fl.forEach(function(p){var c=CL[p.cat]||p.cat;if(!gp[c])gp[c]=[];gp[c].push(p)});

  var h='';
  for(var cat in gp){

      if(p.pub)bd+='<span class="bd bd-p">public</span>';
      if(!p.pub)bd+='<span class="bd bd-x">private</span>';
      if(p.nw)bd+='<span class="bd bd-n">new</span>';
      if(p.ws)bd+='<span class="bd bd-w">'+p.ws+'</span>';

      var lk='';
      if(p.live)lk+='<a class="lnk pr" href="'+p.live+'" target="_blank" onclick="event.stopPropagation()">open</a>';
      if(p.gh)lk+='<a class="lnk" href="'+p.gh+'" target="_blank" onclick="event.stopPropagation()">github</a>';
      if(p.sub)p.sub.forEach(function(s){lk+='<a class="lnk" href="'+s.u+'" target="_blank" onclick="event.stopPropagation()">'+s.t+'</a>'});

      h+='<a class="c" href="'+(p.live||p.gh||"#")+'" target="_blank"><div class="bar" style="background:'+p.cl+'"></div><div class="top"><div class="nm">'+p.n+'</div><div class="bg">'+bd+'</div></div><div class="ds">'+p.ds+'</div><div class="lk">'+lk+'</div><div class="dt">'+p.repo+' &middot; '+p.ts+'</div></a>';
    });
    h+='</div>';
  }
  document.getElementById("cnt").innerHTML=h;
}
